<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitar Acesso | Dom Veterinário</title>
<link rel="stylesheet" href="funcionario.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="funcionario.js"></script>
</head>

<body>
<div class="container">
<div class="logo">
<div class="logo-circle">
<i class="fa-solid fa-user-plus"></i>
</div>
<h1>Solicitar Acesso</h1>
<p>Cadastro de Funcionários</p>
</div>

<form action="conexao.php" method="post">
    <input type="hidden" name="funcionario" value="1">
<div class="form-group">
    
<label>Nome Completo</label>
<div class="input-box">
<i class="fa-regular fa-user"></i>
<input type="text" name="nome" id="nome" placeholder="Digite seu nome completo" required>
</div>
</div>

<div class="form-group">
<label>E-mail</label>
<div class="input-box">
<i class="fa-regular fa-envelope"></i>
<input type="email" name="email" id="email" placeholder="Digite seu e-mail" required>
</div>
</div>

<div class="form-group">
<label>Usuário</label>
<div class="input-box">
<i class="fa-solid fa-id-card"></i>
<input type="text" name="usuario" id="usuario"  placeholder="Crie um usuário" required>
</div>
</div>

<div class="form-group">
<label>Senha</label>
<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" name="senha" id="senha" placeholder="Crie uma senha" required>
</div>
</div>

<button type="submit" onclick="cadastrar()">Solicitar Cadastro</button>
</form>
<div class="bottom-text">
<p>
Já possui acesso?<a href="login.html"> Voltar ao login</a></p>
</div>
</div>

</body>
</html>
